<svg viewBox="0 0 1200 420" width="100%" height="auto" preserveAspectRatio="xMidYMid slice" role="img" aria-label="League of Legends key art — Riot Points (RP) discounted at Comffee, with a glowing Hextech gem" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lolBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1428"/>
      <stop offset="0.55" stop-color="#091428"/>
      <stop offset="1" stop-color="#0A323C"/>
    </linearGradient>
    <linearGradient id="lolWord" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F0E6D2"/>
      <stop offset="1" stop-color="#C8AA6E"/>
    </linearGradient>
    <linearGradient id="lolGemFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A5F"/>
      <stop offset="0.5" stop-color="#0F2747"/>
      <stop offset="1" stop-color="#091428"/>
    </linearGradient>
    <linearGradient id="lolGemEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E4CC8F"/>
      <stop offset="1" stop-color="#C8AA6E"/>
    </linearGradient>
    <radialGradient id="lolGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0AC8B9" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#0AC8B9" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0AC8B9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="lolGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#C8AA6E" stroke-width="1" stroke-opacity="0.2"/>
    </pattern>
    <filter id="lolBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#lolBg)"/>
  <rect width="1200" height="420" fill="url(#lolGrid)"/>
  <rect x="0" y="150" width="1200" height="1.5" fill="#0AC8B9" opacity="0.07"/>
  <rect x="0" y="300" width="1200" height="1.5" fill="#0AC8B9" opacity="0.07"/>

  <!-- left accent slashes -->
  <polygon points="0,0 150,0 60,420 0,420" fill="#C8AA6E" opacity="0.16"/>
  <polygon points="150,0 188,0 98,420 60,420" fill="#0AC8B9" opacity="0.12"/>

  <rect x="6" y="6" width="1188" height="408" fill="none" stroke="#C8AA6E" stroke-width="2" stroke-opacity="0.18"/>

  <!-- wordmark -->
  <text x="70" y="196" font-family="Arial Narrow, Impact, sans-serif" font-weight="900" font-size="74" letter-spacing="2" fill="url(#lolWord)">LEAGUE OF LEGENDS</text>
  <rect x="72" y="216" width="556" height="3" fill="#C8AA6E"/>
  <text x="72" y="256" font-family="Consolas, 'Courier New', monospace" font-size="21" letter-spacing="2.5"><tspan fill="#0AC8B9">// </tspan><tspan fill="#F0E6D2">RIOT POINTS (RP) — discounted at Comffee</tspan></text>

  <!-- right currency motif: Hextech gem -->
  <g transform="translate(995,210)">
    <circle cx="0" cy="0" r="150" fill="url(#lolGlow)"/>
    <g filter="url(#lolBlur)" opacity="0.8">
      <polygon points="0,-118 92,-40 60,108 -60,108 -92,-40" fill="#0AC8B9" opacity="0.4"/>
    </g>
    <!-- gem body -->
    <polygon points="0,-118 92,-40 60,108 -60,108 -92,-40" fill="url(#lolGemFace)" stroke="url(#lolGemEdge)" stroke-width="3"/>
    <!-- facets -->
    <polygon points="0,-118 0,12 -92,-40" fill="#13294B" opacity="0.85"/>
    <polygon points="0,-118 92,-40 0,12" fill="#0E2140" opacity="0.85"/>
    <polygon points="-92,-40 0,12 -60,108" fill="#0B1C38" opacity="0.9"/>
    <polygon points="92,-40 60,108 0,12" fill="#091428" opacity="0.9"/>
    <polygon points="-60,108 0,12 60,108" fill="#0AC8B9" opacity="0.18"/>
    <line x1="0" y1="-118" x2="0" y2="12" stroke="#C8AA6E" stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="-92" y1="-40" x2="92" y2="-40" stroke="#C8AA6E" stroke-width="1.2" stroke-opacity="0.45"/>
    <text x="0" y="34" text-anchor="middle" font-family="Arial Narrow, Impact, sans-serif" font-weight="900" font-size="80" letter-spacing="3" fill="#F0E6D2">RP</text>
  </g>

  <!-- HUD corner sparks -->
  <path d="M1150 40 h28 v28" fill="none" stroke="#0AC8B9" stroke-width="2" stroke-opacity="0.6"/>
  <path d="M1178 392 h-28 v-28" fill="none" stroke="#0AC8B9" stroke-width="2" stroke-opacity="0.6"/>
  <path d="M820 70 h-22 v22" fill="none" stroke="#0AC8B9" stroke-width="2" stroke-opacity="0.45"/>
</svg>