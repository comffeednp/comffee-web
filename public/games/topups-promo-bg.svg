<svg viewBox="0 0 1200 240" width="100%" height="auto" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- base espresso wash -->
    <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0807"/>
      <stop offset="0.5" stop-color="#14100d"/>
      <stop offset="1" stop-color="#1c1714"/>
    </linearGradient>
    <!-- amber burst on the right -->
    <radialGradient id="amberBurst" cx="0.78" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0.42"/>
      <stop offset="0.4" stop-color="#ff8a3d" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <!-- left calm vignette to protect overlaid text -->
    <linearGradient id="leftCalm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a0807" stop-opacity="0.92"/>
      <stop offset="0.38" stop-color="#0a0807" stop-opacity="0.55"/>
      <stop offset="0.62" stop-color="#0a0807" stop-opacity="0"/>
    </linearGradient>
    <!-- angular panel gradients -->
    <linearGradient id="panelA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1714"/>
      <stop offset="1" stop-color="#14100d"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#241d18"/>
      <stop offset="1" stop-color="#1c1714"/>
    </linearGradient>
    <linearGradient id="amberEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffb547" stop-opacity="0.9"/>
    </linearGradient>
    <!-- gold coin -->
    <radialGradient id="coinFace" cx="0.38" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#ffd98a"/>
      <stop offset="0.5" stop-color="#ffb547"/>
      <stop offset="1" stop-color="#b9742a"/>
    </radialGradient>
    <linearGradient id="coinRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe6ad"/>
      <stop offset="1" stop-color="#a8631f"/>
    </linearGradient>
    <radialGradient id="coinGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffb547" stop-opacity="0"/>
    </radialGradient>
    <!-- VP chip -->
    <linearGradient id="vpChip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5a6e"/>
      <stop offset="1" stop-color="#ff3864"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3864" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff3864" stop-opacity="0"/>
    </radialGradient>
    <!-- controller -->
    <linearGradient id="padBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a221c"/>
      <stop offset="1" stop-color="#1a1511"/>
    </linearGradient>

    <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#8a7a68" fill-opacity="0.12"/>
    </pattern>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="burstBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="240" fill="url(#bgBase)"/>
  <rect width="1200" height="240" fill="url(#dotGrid)"/>

  <!-- amber glow burst (blurred) -->
  <ellipse cx="940" cy="108" rx="320" ry="200" fill="url(#amberBurst)" filter="url(#burstBlur)"/>

  <!-- faint circuit traces, right side -->
  <g stroke="#8a7a68" stroke-opacity="0.18" stroke-width="1.4" fill="none">
    <path d="M640 60 H800 V120 H880"/>
    <path d="M700 200 H840 V150 H980"/>
    <path d="M1050 40 V100 H960"/>
    <path d="M1120 160 H1010 V210"/>
  </g>
  <g fill="#ffb547" fill-opacity="0.35">
    <circle cx="800" cy="120" r="2.4"/><circle cx="880" cy="120" r="2.4"/>
    <circle cx="840" cy="150" r="2.4"/><circle cx="960" cy="100" r="2.4"/>
    <circle cx="1010" cy="210" r="2.4"/>
  </g>

  <!-- layered angular panels (right) -->
  <polygon points="560,240 720,0 900,0 740,240" fill="url(#panelA)" fill-opacity="0.9"/>
  <polygon points="780,240 940,0 1080,0 920,240" fill="url(#panelB)" fill-opacity="0.85"/>
  <polygon points="1000,240 1150,0 1200,0 1200,240" fill="url(#panelA)" fill-opacity="0.7"/>
  <!-- amber accent edges -->
  <polygon points="900,0 906,0 746,240 740,240" fill="url(#amberEdge)" fill-opacity="0.5"/>
  <line x1="940" y1="0" x2="780" y2="240" stroke="#ff8a3d" stroke-opacity="0.35" stroke-width="2"/>

  <!-- (terminal labels removed — the live banner component overlays its own text) -->

  <!-- ============ TOKENS (right) ============ -->

  <!-- gold coin -->
  <g transform="translate(870,120)">
    <circle r="60" fill="url(#coinGlow)"/>
    <g filter="url(#softGlow)">
      <circle r="40" fill="url(#coinRim)"/>
      <circle r="33" fill="url(#coinFace)"/>
      <circle r="33" fill="none" stroke="#a8631f" stroke-opacity="0.6" stroke-width="1.5"/>
      <path d="M-9 -16 h14 a10 10 0 0 1 0 20 h-9 v12 h-5 z M-5 -11 v10 h9 a5 5 0 0 0 0 -10 z"
            fill="#8a5418" transform="translate(-2,2)"/>
      <text x="0" y="9" text-anchor="middle" font-family="ui-monospace,monospace" font-size="26" font-weight="700" fill="#7a4a14">P</text>
    </g>
  </g>

  <!-- Valorant VP red diamond chip -->
  <g transform="translate(1030,80)">
    <circle r="52" fill="url(#redGlow)"/>
    <g filter="url(#softGlow)">
      <polygon points="0,-34 30,0 0,34 -30,0" fill="url(#vpChip)"/>
      <polygon points="0,-34 30,0 0,34 -30,0" fill="none" stroke="#ff8a3d" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="0" y="6" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="700" fill="#fff4f4" letter-spacing="1">VP</text>
    </g>
  </g>

  <!-- controller silhouette -->
  <g transform="translate(1015,178)" opacity="0.95">
    <g filter="url(#softGlow)">
      <path d="M-58 -6 q-14 0 -18 16 l-7 26 q-4 18 12 18 q10 0 16 -10 l6 -10 h78 l6 10 q6 10 16 10 q16 0 12 -18 l-7 -26 q-4 -16 -18 -16 z"
            fill="url(#padBody)" stroke="#3d3430" stroke-width="1.5"/>
      <!-- dpad -->
      <rect x="-44" y="-4" width="18" height="6" rx="1" fill="#8a7a68"/>
      <rect x="-38" y="-10" width="6" height="18" rx="1" fill="#8a7a68"/>
      <!-- buttons -->
      <circle cx="34" cy="-6" r="3.4" fill="#7CFFB2"/>
      <circle cx="46" cy="2" r="3.4" fill="#ffb547"/>
      <circle cx="22" cy="2" r="3.4" fill="#58e1ff"/>
      <circle cx="34" cy="10" r="3.4" fill="#ff3864"/>
    </g>
  </g>

  <!-- left calm overlay (protects overlaid headline) -->
  <rect width="1200" height="240" fill="url(#leftCalm)"/>

  <!-- CRT scanlines -->
  <g stroke="#f4ecdf" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
  </g>
  <rect width="1200" height="240" fill="none" stroke="#3d3430" stroke-width="1.5"/>
</svg>