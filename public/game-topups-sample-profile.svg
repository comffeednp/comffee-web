<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220" role="img" aria-label="Example in-game profile screenshot showing the name Westbourne and tag SEA">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1714"/>
      <stop offset="1" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="av" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff3864"/>
    </linearGradient>
    <radialGradient id="avglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffb547" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="358" height="218" rx="14" fill="url(#card)" stroke="#3d3430"/>
  <rect x="1" y="1" width="358" height="3" rx="1.5" fill="#ff8a3d"/>

  <!-- header -->
  <text x="20" y="32" font-family="Consolas, 'JetBrains Mono', monospace" font-size="12" letter-spacing="2.5" fill="#8a7a68">VALORANT &#8226; PROFILE</text>
  <rect x="286" y="18" width="56" height="20" rx="10" fill="#2a2320" stroke="#3d3430"/>
  <text x="314" y="32" text-anchor="middle" font-family="Consolas, 'JetBrains Mono', monospace" font-size="11" fill="#ffb547">LVL 142</text>

  <!-- avatar -->
  <circle cx="52" cy="118" r="42" fill="url(#avglow)"/>
  <circle cx="52" cy="118" r="30" fill="url(#av)"/>
  <circle cx="52" cy="118" r="30" fill="none" stroke="#ffb547" stroke-width="2"/>
  <circle cx="52" cy="108" r="9" fill="#1a0f06" opacity="0.6"/>
  <path d="M36 132 Q52 116 68 132" fill="#1a0f06" opacity="0.6"/>

  <!-- highlight around the name + tag -->
  <rect x="96" y="92" width="244" height="52" rx="10" fill="#ffb547" fill-opacity="0.10" stroke="#ffb547" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="108" y="128" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#f4ecdf">Westbourne<tspan fill="#ffb547" font-size="22"> #SEA</tspan></text>

  <!-- callout -->
  <text x="108" y="166" font-family="Consolas, 'JetBrains Mono', monospace" font-size="12" fill="#ffb547">&#9650; your name + #tag must be readable</text>

  <!-- faux stat bars for realism -->
  <g>
    <rect x="20" y="186" width="150" height="8" rx="4" fill="#2a2320"/>
    <rect x="20" y="186" width="104" height="8" rx="4" fill="#7CFFB2" opacity="0.7"/>
    <rect x="190" y="186" width="150" height="8" rx="4" fill="#2a2320"/>
    <rect x="190" y="186" width="70" height="8" rx="4" fill="#58e1ff" opacity="0.7"/>
  </g>
</svg>
